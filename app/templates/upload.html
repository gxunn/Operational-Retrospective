{% extends "base.html" %}{% block title %}上传数据 · {{ app_name }}{% endblock %}
{% block content %}
<section class="page-heading"><div><p class="section-note">第一步</p><h1>上传平台数据</h1><p>选择账号并上传平台导出的原始表格，系统会先预览，不会立即写入。</p></div><a class="button secondary" href="/imports">查看导入记录</a></section>
<section class="upload-layout"><form class="panel upload-card" method="post" action="/imports/upload" enctype="multipart/form-data"><input type="hidden" name="csrf" value="{{ csrf_token }}"><label>上传到哪个账号<select name="account_id" required><option value="">请选择平台账号</option>{% for account in accounts %}<option value="{{ account.id }}">{{ account.platform }} · {{ account.name }}</option>{% endfor %}</select></label><label class="drop-zone" data-drop><input type="file" name="file" accept=".csv,.xlsx,.xls" required><svg viewBox="0 0 24 24"><use href="/static/icons.svg#upload"></use></svg><strong>点击选择，或把表格拖到这里</strong><span>支持 CSV、XLSX、XLS，最大 {{ max_mb }}MB</span><em data-file-name>尚未选择文件</em></label><button class="button primary">上传并预览</button></form>
<aside class="guide-panel"><h2>上传前不用整理</h2><ol><li><strong>直接导出</strong><span>从平台后台导出表格即可。</span></li><li><strong>确认字段</strong><span>系统自动识别，识别错了可手动调整。</span></li><li><strong>确认导入</strong><span>预览无误后才会保存数据。</span></li></ol><p>提示：含“内容标题”的表格会生成内容排名；只有汇总指标的表格会保存为账号日报。</p></aside></section>
{% endblock %}
